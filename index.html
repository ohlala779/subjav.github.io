<!DOCTYPE html>
<html lang="vi">
<head>
 <link rel="manifest" href="/subjav.github.io/manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SubJav">
<meta name="theme-color" content="#111111">
<link rel="apple-touch-icon" href="https://subjav.mom/wp-content/uploads/2024/08/fav24.png">
  <style>
    body {
      margin: 0;
      background: #1b1b1b;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: sans-serif;
    }
    .loader {
      text-align: center;
      color: #fff;
    }
    .logo {
      font-size: 2rem;
      font-weight: bold;
      color: #e50914;
      margin-bottom: 16px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #333;
      border-top-color: #e50914;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader">
    <div class="logo">SUBJAV</div>
    <div class="spinner"></div>
    <p>Đang kết nối...</p>
  </div>

  <script>
    // URL file JSON chứa domain hiện tại - bạn sẽ sửa file này khi đổi domain
    var CONFIG_URL = '/domain.json';

    // Danh sách domain dự phòng nếu fetch config thất bại
    var FALLBACKS = [
      'https://subjav.mom',
      'https://subjav.site'
    ];

    function goTo(url) {
      window.location.replace(url);
    }

    async function tryFallbacks() {
      for (var i = 0; i < FALLBACKS.length; i++) {
        try {
          var r = await fetch(FALLBACKS[i] + '/robots.txt', {
            mode: 'no-cors',
            signal: AbortSignal.timeout(3000)
          });
          goTo(FALLBACKS[i]);
          return;
        } catch(e) {}
      }
      // Tất cả thất bại - hiện thông báo
      document.querySelector('p').textContent = 'Không thể kết nối. Thử lại sau.';
      document.querySelector('.spinner').style.display = 'none';
    }

    async function redirect() {
      try {
        var res = await fetch(CONFIG_URL + '?_=' + Date.now(), { cache: 'no-store' });
        var cfg = await res.json();
        goTo(cfg.primary);
      } catch(e) {
        tryFallbacks();
      }
    }

    redirect();
  </script>
  <script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/subjav.github.io/sw.js', { scope: '/subjav.github.io/' });
}
</script>
</body>
</html>
